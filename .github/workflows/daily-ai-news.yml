name: Daily AI News Update

on:
  schedule:
    - cron: '30 10 * * *' # Triggers at 4:00 PM local time
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # FIXED: Upgraded to v4

    - name: Set up Python
      uses: actions/setup-python@v5 # FIXED: Upgraded to v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install feedparser

    - name: Run update script
      run: python update_ai_news.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add README.md
        
        # FIXED: Checks if the file actually changed before trying to commit
        if git diff-index --quiet HEAD; then
          echo "No new news today. Skipping commit."
        else
          git commit -m "docs: Update daily AI news"
          git push
        fi
